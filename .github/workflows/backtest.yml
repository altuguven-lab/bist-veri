# IP-1 OLAY PENCERESI BACKTEST
# Konum: .github/workflows/backtest.yml
# Sadece elle tetiklenir (Actions -> Olay Penceresi Backtest -> Run workflow).
# Sonuc: data/backtest/olay_penceresi_sonuc.json
name: Olay Penceresi Backtest

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklar
        run: pip install yfinance pandas numpy

      - name: Backtesti kostur
        run: python olay_penceresi.py

      - name: Sonucu commit'le
        run: |
          git config user.name "bist-veri-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/backtest/
          git diff --staged --quiet || git commit -m "IP-1 olay penceresi sonuclari $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
