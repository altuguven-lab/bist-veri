# IP-1 + IP-2 BACKTEST PAKETI
# Konum: .github/workflows/backtest.yml (mevcut dosyanin uzerine yazilir)
# Sadece elle tetiklenir. Sonuclar: data/backtest/
name: Olay Penceresi Backtest

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklar
        run: pip install yfinance pandas numpy

      - name: IP-1 olay penceresi
        run: python olay_penceresi.py

      - name: IP-2 iskelet karakter haritasi
        run: python ip2_iskelet.py

      - name: Sonuclari commit'le
        run: |
          git config user.name "bist-veri-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/backtest/
          git diff --staged --quiet || git commit -m "IP-1/IP-2 backtest sonuclari $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
