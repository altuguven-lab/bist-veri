# RETRO FIRSAT ENVANTERI - v2 (23.07): haftalik otomatik + elle kosum
# Konum: .github/workflows/retro_firsat.yml
name: Retro Firsat
on:
  schedule:
    - cron: "30 15 * * 5"  # hafta kapanisi, hafta_denetim'den 15dk once
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  retro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance==0.2.66
      - run: python retro_firsat.py
      - run: |
          git config user.name "retro-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/denetim/
          git diff --staged --quiet || git commit -m "Retro firsat envanteri $(date -u +%Y-%m-%d)"
          git push
