name: BIST Veri Guncelleme

on:
  schedule:
    - cron: "*/15 7-15 * * 1-5"
  workflow_dispatch: {}

jobs:
  guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: BIST verisini cek
        run: python fetch_bist.py

- name: Commit ve push
        run: |
          git config user.name "bist-veri-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/haber_akisi.json
          git diff --staged --quiet || git commit -m "Otomatik haber guncelleme $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
