# HAFTA KAPANISI DENETIMI (K1)
# Konum: .github/workflows/hafta_denetim.yml
# Cuma 18:45 TR (15:45 UTC) - kapanis + GUNLUK_OZET sonrasi.
# Elle kosum: Actions -> Hafta Denetimi -> Run workflow
name: Hafta Denetimi
on:
  schedule:
    - cron: "45 15 * * 5"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  denetim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance==0.2.66
      - run: python hafta_denetim.py
      - name: Denetim ciktisini commit et
        run: |
          git config user.name "hafta-denetim-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/denetim/
          git diff --staged --quiet || git commit -m "Hafta denetimi $(date -u +%Y-%m-%d)"
          git push
